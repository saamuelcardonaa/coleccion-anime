<div class="container my-4">
  <h3>Buscar anime (Jikan API)</h3>
  <div class="input-group mb-3">
    <input type="text" class="form-control" placeholder="Nombre del anime" [(ngModel)]="nombreAnime">
    <button class="btn btn-primary" (click)="buscar()" [disabled]="loading">Buscar</button>
  </div>
  <div *ngIf="loading" class="text-center my-3">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
  </div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  <div class="row g-3" *ngIf="!loading && resultados.length">
    <div class="col-md-4" *ngFor="let anime of resultados">
      <div class="card h-100">
        <img *ngIf="anime.imagen" [src]="anime.imagen" class="card-img-top" [alt]="anime.titulo" style="object-fit:cover;max-height:180px;">
        <div class="card-body">
          <h5 class="card-title">{{ anime.titulo }}</h5>
          <p class="card-text mb-1"><b>Score:</b> {{ anime.score }}</p>
          <p class="card-text mb-1"><b>Episodios:</b> {{ anime.episodios }}</p>
          <a *ngIf="anime.enlaceMAL" [href]="anime.enlaceMAL" target="_blank" class="btn btn-outline-primary btn-sm">Ver en MAL</a>
        </div>
      </div>
    </div>
  </div>
  <div *ngIf="!loading && !resultados.length && !error" class="alert alert-info">
    No hay resultados.
  </div>
</div>
