<form [formGroup]="figuraForm" (ngSubmit)="onSubmit()" class="p-3 border rounded bg-light">
  <div class="mb-3">
    <label for="nombre" class="form-label">Nombre *</label>
    <input id="nombre" type="text" class="form-control" formControlName="nombre" required>
    <div *ngIf="figuraForm.get('nombre')?.invalid && figuraForm.get('nombre')?.touched" class="text-danger small">
      El nombre es obligatorio.
    </div>
  </div>
  <div class="mb-3">
    <label for="anime" class="form-label">Anime *</label>
    <input id="anime" type="text" class="form-control" formControlName="anime" required>
    <div *ngIf="figuraForm.get('anime')?.invalid && figuraForm.get('anime')?.touched" class="text-danger small">
      El anime es obligatorio.
    </div>
  </div>
  <div class="mb-3">
    <label for="personaje" class="form-label">Personaje</label>
    <input id="personaje" type="text" class="form-control" formControlName="personaje">
  </div>
  <div class="mb-3">
    <label for="precio" class="form-label">Precio</label>
    <input id="precio" type="number" class="form-control" formControlName="precio" min="0">
    <div *ngIf="figuraForm.get('precio')?.invalid && figuraForm.get('precio')?.touched" class="text-danger small">
      El precio debe ser mayor o igual a 0.
    </div>
  </div>
  <div class="mb-3">
    <label for="stock" class="form-label">Stock</label>
    <input id="stock" type="number" class="form-control" formControlName="stock" min="0">
    <div *ngIf="figuraForm.get('stock')?.invalid && figuraForm.get('stock')?.touched" class="text-danger small">
      El stock debe ser mayor o igual a 0.
    </div>
  </div>
  <div class="mb-3">
    <label for="imagen" class="form-label">Imagen (URL)</label>
    <input id="imagen" type="text" class="form-control" formControlName="imagen">
  </div>
  <div class="mb-3">
    <label for="malId" class="form-label">malId (opcional)</label>
    <input id="malId" type="number" class="form-control" formControlName="malId">
  </div>
  <button type="submit" class="btn btn-primary" [disabled]="figuraForm.invalid || loading">Guardar</button>
  <div *ngIf="error" class="alert alert-danger mt-2">{{ error }}</div>
</form>
