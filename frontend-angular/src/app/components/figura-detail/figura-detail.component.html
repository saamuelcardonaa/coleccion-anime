<div class="container mt-4">
  <div *ngIf="loading" class="alert alert-info d-flex align-items-center gap-2">
    <div class="spinner-border spinner-border-sm" role="status"></div>
    <span>Cargando...</span>
  </div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div *ngIf="figura" class="card shadow">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h4 class="mb-0">Detalle de Figura</h4>
      <span class="badge bg-secondary">ID: {{ figura._id }}</span>
    </div>
    <div class="card-body">
      <h5 class="card-title">{{ figura.nombre }}</h5>
      <p class="card-text"><b>Anime:</b> {{ figura.anime }}</p>
      <p class="card-text"><b>Personaje:</b> {{ figura.personaje || '-' }}</p>
      <p class="card-text"><b>Precio:</b> {{ figura.precio | currency:'EUR':'symbol':'1.0-2' }}</p>
      <p class="card-text"><b>Stock:</b> {{ figura.stock }}</p>
      <div *ngIf="figura.imagen && figura.imagen.startsWith('http')" class="mb-2">
        <img [src]="figura.imagen" [alt]="figura.nombre" class="img-fluid rounded" style="max-height: 200px; object-fit: cover;">
      </div>
    </div>
    <div class="card-footer d-flex justify-content-between">
      <button class="btn btn-secondary" (click)="volver()">
        <i class="bi bi-arrow-left"></i> Volver
      </button>
      <button class="btn btn-primary" (click)="editar()">
        <i class="bi bi-pencil"></i> Editar
      </button>
    </div>
  </div>
</div>
