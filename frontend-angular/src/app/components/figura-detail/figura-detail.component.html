<div class="container mt-4">
  <div *ngIf="loading" class="alert alert-info d-flex align-items-center gap-2">
    <div class="spinner-border spinner-border-sm" role="status"></div>
    <span>Cargando...</span>
  </div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <ng-container *ngIf="figura as f">
    <div class="card shadow">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h4 class="mb-0">Detalle de Figura</h4>
        <span class="badge bg-secondary">ID: {{ f._id }}</span>
      </div>
      <div class="card-body">
        <div class="row">
          <div class="col-md-8">
            <table class="table table-borderless mb-0">
              <tbody>
                <tr><th>Nombre</th><td>{{ f.nombre }}</td></tr>
                <tr><th>Anime</th><td>{{ f.anime }}</td></tr>
                <tr><th>Personaje</th><td>{{ f.personaje || '-' }}</td></tr>
                <tr><th>Precio</th><td>{{ f.precio | currency:'EUR':'symbol':'1.0-2' }}</td></tr>
                <tr><th>Stock</th><td>{{ f.stock }}</td></tr>
                <tr><th>malId</th><td>{{ f.malId || '-' }}</td></tr>
                <tr *ngIf="f.imagen">
                  <th>Imagen</th>
                  <td>
                    <ng-container *ngIf="f.imagen.startsWith('http'); else textoImagen">
                      <img [src]="f.imagen" [alt]="f.nombre" class="img-fluid rounded" style="max-height: 200px; object-fit: cover;">
                    </ng-container>
                    <ng-template #textoImagen>{{ f.imagen }}</ng-template>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="card-footer d-flex gap-2 justify-content-end">
        <button class="btn btn-secondary" (click)="volver()">
          <i class="bi bi-arrow-left"></i> Volver
        </button>
        <button class="btn btn-primary" (click)="editar()">
          <i class="bi bi-pencil"></i> Editar
        </button>
        <button class="btn btn-danger" (click)="confirmarEliminar()" [disabled]="loadingDelete">
          <span *ngIf="loadingDelete" class="spinner-border spinner-border-sm me-1"></span>
          <i class="bi bi-trash"></i> Eliminar
        </button>
      </div>
    </div>
  </ng-container>
<ng-template #textoImagen>{{ figura?.imagen }}</ng-template>
</div>
