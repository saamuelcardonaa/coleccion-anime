<!-- src/app/components/figura-list/figura-list.component.html -->
<!-- Template para mostrar lista de figuras en una tabla Bootstrap con opciones CRUD -->

<div class="container mt-4">
  <h2 class="mb-4">Colección de Figuras de Anime</h2>

  <!-- Mensaje de error -->
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center my-5">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
  </div>

  <!-- Lista de figuras -->
  <div class="row g-3" *ngIf="!loading && figuras.length">
    <div class="col-md-4" *ngFor="let figura of figuras">
      <div class="card h-100">
        <div class="card-body">
          <h5 class="card-title">{{ figura.nombre }}</h5>
          <p class="card-text mb-1"><b>Anime:</b> {{ figura.anime }}</p>
          <p class="card-text mb-1"><b>Personaje:</b> {{ figura.personaje || '-' }}</p>
          <p class="card-text mb-1"><b>Precio:</b> {{ figura.precio }}€</p>
          <p class="card-text mb-2"><b>Stock:</b> {{ figura.stock }}</p>
          <div *ngIf="figura.imagen && figura.imagen.startsWith('http')" class="mb-2">
            <img [src]="figura.imagen" [alt]="figura.nombre" class="img-fluid rounded" style="max-height: 160px; object-fit: cover;">
          </div>
          <button class="btn btn-danger btn-sm" (click)="eliminarFigura(figura._id)">Eliminar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Sin figuras -->
  <div *ngIf="!loading && !figuras.length" class="alert alert-info">
    No hay figuras en la colección.
  </div>
</div>
