<!-- src/app/app.component.html -->
<!-- Template principal de la aplicación Angular -->

<!-- Navbar principal: fondo oscuro, texto claro, borde inferior -->
<nav class="navbar navbar-expand-lg bg-dark border-bottom border-secondary navbar-dark">
  <div class="container-fluid">
    <!-- Brand a la izquierda -->
    <a class="navbar-brand" routerLink="/">
      Colección Anime
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <!-- Links de navegación -->
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/figuras" routerLinkActive="active">Catálogo</a>
        </li>
      </ul>
      <!-- Botón CTA dorado a la derecha -->
      <a class="btn btn-warning" routerLink="/figuras/nueva">
        <i class="bi bi-plus-circle me-1"></i>
        Añadir
      </a>
    </div>
  </div>
</nav>

<!-- Contenido principal -->
<main class="container py-4">
  <!-- Aquí se renderizan los componentes según la ruta -->
  <router-outlet></router-outlet>
</main>

<!-- Footer sencillo -->
<footer class="bg-dark text-secondary text-center py-3 mt-5 border-top border-secondary">
  <!-- Pie de página -->
  <small>&copy; 2026 Colección Anime</small>
</footer>
